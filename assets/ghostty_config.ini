# ==================================================
# Ghostty — HAL / mqlaunch Full Setup
# macOS Optimized
# ==================================================

# Typography
font-size = 14
adjust-cell-height = 0%
adjust-cell-width = 0%

# Window / Layout
window-width = 138
window-height = 40
window-step-resize = true
window-save-state = always
window-padding-x = 6
window-padding-y = 4
window-padding-balance = true
window-theme = auto
window-colorspace = srgb

# macOS Window Style
# 'transparent' is not valid, using 'hidden'
macos-titlebar-style = hidden
macos-window-buttons = hidden
macos-option-as-alt = true

# Quick Terminal / Dropdown
quick-terminal-position = top
quick-terminal-size = 42%
quick-terminal-animation-duration = 0.12

# Visuals
background-opacity = 0.96
background-blur = true
unfocused-split-opacity = 0.92

# Interaction
cursor-style = block
cursor-style-blink = false
mouse-hide-while-typing = true
copy-on-select = clipboard
clipboard-paste-protection = true
link-url = true
confirm-close-surface = true

# Shell
shell-integration = detect
command = /bin/zsh -lc mqlaunch
working-directory = home

# Scrollback
scrollback-limit = 50000000

# Theme — ICE HAL (with # for robustness)
background = #0f1419
foreground = #d8e2eb
cursor-color = #7dd3fc
cursor-text = #0f1419
selection-background = #233041
selection-foreground = #e6edf3

palette = 0=#11161c
palette = 1=#ff7b72
palette = 2=#7ee787
palette = 3=#e3b341
palette = 4=#79c0ff
palette = 5=#d2a8ff
palette = 6=#7ee7ff
palette = 7=#c9d1d9
palette = 8=#6e7681
palette = 9=#ffa198
palette = 10=#56d364
palette = 11=#e3b341
palette = 12=#79c0ff
palette = 13=#bc8cff
palette = 14=#39c5cf
palette = 15=#f0f6fc

# Keybinds (using 'super' for macOS Command)
keybind = super+shift+o=open_config
keybind = super+shift+r=reload_config
keybind = super+t=new_tab
keybind = super+w=close_surface
keybind = super+shift+d=new_split:right
keybind = super+shift+enter=new_split:down
keybind = super+alt+left=goto_split:left
keybind = super+alt+right=goto_split:right
keybind = super+alt+up=goto_split:up
keybind = super+alt+down=goto_split:down
keybind = super+ctrl+left=resize_split:left,20
keybind = super+ctrl+right=resize_split:right,20
keybind = super+ctrl+up=resize_split:up,10
keybind = super+ctrl+down=resize_split:down,10
keybind = super+alt+e=equalize_splits
keybind = super+alt+z=toggle_split_zoom
keybind = super+alt+0=reset_window_size
keybind = super+plus=increase_font_size:1
keybind = super+minus=decrease_font_size:1
keybind = super+0=reset_font_size
